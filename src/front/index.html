<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>Welcome to my Minichat</title>

  <link rel="stylesheet"
    href="/css/main.css">

</head>

<body>
  <div class="userInformation">
    <div class="alertSpan">
      <span id="alertUserName"></span>
    </div>
    <div>
      <input type="text"
        id="userName">
      <button class="btn"
        id="begining">Comenzar</button>
    </div>
  </div>
  <div class="chats hide">
    <div class="rooms">
      <div class="main"
        id="chat-container"></div>

      <div class="sidebar">
        <div class="room-controls">
          <input type="text"
            name="newRoom"
            placeholder="Name new room">
          <button id="room">Create</button>
        </div>
        <div class="allrooms"
          id="rooms-container">
          <span class="msg active">default</span>
        </div>
      </div>
    </div>

    <div class="text">
      <textarea name="message"
        rows="4"
        placeholder="Write a message..."></textarea>
      <button id="send">Send Msg</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <script src="/js/main.js"></script>

  </script>

</body>

</html>
