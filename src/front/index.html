<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>Welcome to my Minichat</title>

  <link rel="stylesheet"
    href="/css/main.css">

</head>

<body>
  <div class="userInformation">
    <input type="text"
      id="userName">
    <button class="btn"
      id="begining">Comenzar</button>
  </div>
  <div class="chats hide">
    <div class="rooms">
      <div class="main"
        id="chat-container"></div>

      <div class="sidebar">
        <div class="room-controls">
          <input type="text"
            name="newRoom"
            placeholder="Name new room">
          <button id="room">Create</button>
        </div>
        <div class="allrooms"
          id="rooms-container">
          <span class="msg active">default</span>
        </div>
      </div>
    </div>

    <div class="text">
      <textarea name="message"
        rows="4"
        placeholder="Write a message..."></textarea>
      <button id="send">Send Msg</button>
    </div>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

  <script>
    const btnBeging = document.querySelector('#begining');
    const divChats = document.querySelector('.chats');
    const btnSend = document.querySelector('#send');
    const btnRoom = document.querySelector('#room');
    const txtMsg = document.querySelector('[name=message]');
    const divMain = document.querySelector('#chat-container');
    const inpRoom = document.querySelector('[name=newRoom]');
    const divRooms = document.querySelector('#rooms-container');
    const userInformation = document.querySelector('.userInformation');
    const inputUserName = document.querySelector('#userName');
    let attachedFile = null;

    let userName = '';
    let currentRoom = 'default';

    const chatHistory = {
      default: []
    };

    const socket = io('/chat');

    // Contenedor principal de la zona de texto (necesario para las clases CSS de carga)
    const containerText = document.querySelector('.chats .text');

    // ==========================================
    // GESTIÓN DE ARRASTRAR Y SOLTAR ARCHIVOS
    // ==========================================
    txtMsg.addEventListener('dragover', (e) => {
      e.preventDefault();
      e.stopPropagation();
      containerText.classList.add('dragover');
    });

    txtMsg.addEventListener('dragleave', (e) => {
      e.preventDefault();
      e.stopPropagation();
      containerText.classList.remove('dragover');
    });

    txtMsg.addEventListener('drop', async (e) => {
      e.preventDefault();
      e.stopPropagation();

      containerText.classList.remove('dragover');

      const file = e.dataTransfer?.files?.[0];
      if (!file) return;

      // Activar estado visual de carga
      containerText.classList.add('loading');
      const originalPlaceholder = txtMsg.placeholder;
      txtMsg.value = '';
      txtMsg.placeholder = 'Subiendo archivo... por favor espere.';

      try {
        const uploaded = await uploadFile(file);

        // Emitir el mensaje de tipo archivo con su estructura correspondiente
        socket.emit('message', {
          room: currentRoom,
          message: {
            type: 'file',
            userName,
            fileName: uploaded.originalname,
            url: uploaded.url
          }
        });

        // Auto-renderizar para el propio emisor de manera local
        saveAndRenderMessage({
          userName,
          type: 'file',
          fileName: uploaded.originalname,
          url: uploaded.url
        }, currentRoom);

      } catch (error) {
        console.error('Error al subir el archivo:', error);
        alert('Hubo un error al subir el archivo.');
      } finally {
        // Desactivar estado de carga sin importar si falló o tuvo éxito
        containerText.classList.remove('loading');
        txtMsg.placeholder = originalPlaceholder;
      }
    });

    // UI transición login
    userInformation.style.transition = 'all .4s ease';

    // =========================
    // LOGIN
    // =========================
    btnBeging.addEventListener('click', () => {
      userName = inputUserName.value.trim();

      if (!userName) {
        alert('Ingrese un nombre de usuario');
        return;
      }

      socket.emit('join', {
        room: 'default',
        userName
      });

      divChats.classList.remove('hide');

      userInformation.style.opacity = '0';
      userInformation.style.transform = 'translateY(-20px)';
      userInformation.style.maxHeight = '0';
      userInformation.style.padding = '0';
      userInformation.style.margin = '0';

      setTimeout(() => {
        userInformation.style.display = 'none';
      }, 400);
    });

    // =========================
    // SOCKET EVENTS
    // =========================
    socket.on('connect', () => {
      console.log('Connected:', socket.id);

      document
        .querySelector('div.allrooms span')
        .addEventListener('click', onRoomClick);

      btnRoom.addEventListener('click', () => {
        const newRoom = inpRoom.value.trim();
        if (!newRoom) return;

        createRoomTab(newRoom);

        socket.emit('newroom', {
          newRoom,
          room: currentRoom
        });

        inpRoom.value = '';
      });

      socket.on('newroom', (newRoom) => {
        createRoomTab(newRoom);
      });

      btnSend.addEventListener('click', sendMessage);

      txtMsg.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      socket.on('message', (data) => {
        const room = data.room ?? currentRoom;

        // Se extraen todas las propiedades de manera segura (tanto texto como archivos)
        const message = {
          userName: data.userName ?? 'system',
          type: data.type ?? 'text',
          msg: data.msg,
          fileName: data.fileName,
          url: data.url
        };

        saveAndRenderMessage(message, room);
      });

      socket.on('history', (data) => {
        const { room, messages } = data;

        chatHistory[room] = messages;

        if (room === currentRoom) {
          divMain.innerHTML = '';
          messages.forEach(renderSingleMessage);
        }
      });
    });

    // =========================
    // SEND MESSAGE
    // =========================
    function sendMessage() {
      const message = txtMsg.value.trim();
      if (!message) return;

      const messagePayload = {
        type: 'text',
        userName,
        msg: message
      };

      socket.emit('message', {
        room: currentRoom,
        message: messagePayload
      });

      // Renderizar localmente para el emisor
      saveAndRenderMessage(messagePayload, currentRoom);

      txtMsg.value = '';
    }

    // =========================
    // SAVE + RENDER
    // =========================
    function saveAndRenderMessage(message, roomName) {
      if (!chatHistory[roomName]) {
        chatHistory[roomName] = [];
      }

      // Evitar duplicar mensajes si ya se guardó localmente
      const yaExiste = chatHistory[roomName].some(m =>
        m.userName === message.userName &&
        m.msg === message.msg &&
        m.url === message.url
      );

      if (!yaExiste) {
        chatHistory[roomName].push(message);
      }

      if (roomName === currentRoom) {
        renderSingleMessage(message);
      }
    }

    function renderSingleMessage(message) {
      const container = document.createElement('div');
      container.classList.add('msg');

      let contentHtml = '';
      if (message.type === 'file') {
        contentHtml = `<a href="${message.url}" target="_blank" class="file-link">📎 Descargar: ${message.fileName}</a>`;
      } else {
        contentHtml = message.msg || '';
      }

      container.innerHTML = `
    <strong>${message.userName}</strong><br>
    ${contentHtml}
  `;

      divMain.appendChild(container);
      divMain.scrollTop = divMain.scrollHeight;
    }

    // =========================
    // ROOMS
    // =========================
    function onRoomClick(event) {
      const element = event.target;
      if (!(element instanceof HTMLElement)) return;

      const selectedRoom = element.textContent;
      if (currentRoom === selectedRoom) return;

      const before = currentRoom;
      currentRoom = selectedRoom;

      document
        .querySelector('div.allrooms span.active')
        .classList.remove('active');

      element.classList.add('active');

      divMain.innerHTML = '';

      const messages = chatHistory[currentRoom] || [];
      messages.forEach(renderSingleMessage);

      socket.emit('changeRoom', {
        before,
        room: currentRoom
      });
    }

    function createRoomTab(roomName) {
      const exists = Array.from(divRooms.children)
        .some(el => el.textContent === roomName);

      if (exists) return;

      if (!chatHistory[roomName]) {
        chatHistory[roomName] = [];
      }

      const span = document.createElement('span');
      span.textContent = roomName;
      span.classList.add('msg');
      span.addEventListener('click', onRoomClick);

      divRooms.appendChild(span);
    }

    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('file', file);

      const response = await fetch('/upload', {
        method: 'POST',
        body: formData
      });

      if (!response.ok) {
        throw new Error('Error en la respuesta del servidor');
      }

      return response.json();
    }
  </script>

</body>

</html>
