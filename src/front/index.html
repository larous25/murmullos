<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
  <title>Welcome to my Minichat</title>
  <style>
    :root {
      --bg-color: #f4f7f6;
      --chat-bg: #ffffff;
      --primary: #5f9ea0;
      --text-main: #333333;
      --border-radius: 8px;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    div.rooms {
      display: flex;
      gap: 15px;
      height: 350px;
      width: 100%;
      max-width: 800px;
      margin-bottom: 15px;
    }

    /* Área de Mensajes Principal */
    div.main {
      background: var(--chat-bg);
      flex: 7;
      overflow-y: auto;
      padding: 15px;
      border-radius: var(--border-radius);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      border: 1px solid #e0e0e0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    div.main span.msg {
      background: #f0f4f8;
      padding: 8px 12px;
      border-radius: var(--border-radius);
      color: var(--text-main);
      word-break: break-word;
    }

    /* Panel Lateral (Salas / Tabs) */
    div.sidebar {
      flex: 3;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .room-controls {
      display: flex;
      gap: 5px;
    }

    div.allrooms {
      background: var(--chat-bg);
      flex-grow: 1;
      overflow-y: auto;
      padding: 10px;
      border-radius: var(--border-radius);
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      border: 1px solid #e0e0e0;
    }

    div.allrooms span.msg {
      display: block;
      cursor: pointer;
      padding: 8px 10px;
      border-radius: 4px;
      margin-bottom: 5px;
      transition: background 0.2s ease;
    }

    div.allrooms span.msg:hover {
      background: #e9ecef;
    }

    div.allrooms span.msg.active {
      background: var(--primary);
      color: white;
      font-weight: bold;
    }

    /* Controles de Texto Inferiores */
    div.text {
      width: 100%;
      max-width: 800px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    textarea[name=message] {
      width: 100%;
      box-sizing: border-box;
      padding: 10px;
      border-radius: var(--border-radius);
      border: 1px solid #ccc;
      resize: vertical;
      font-family: inherit;
    }

    input[type=text] {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }

    button {
      background: var(--primary);
      border: none;
      border-radius: 4px;
      color: white;
      cursor: pointer;
      padding: 8px 12px;
      font-weight: bold;
      transition: background 0.2s ease, opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button#send {
      align-self: flex-end;
      padding: 10px 20px;
    }
  </style>
</head>

<body>
  <div class="rooms">
    <div class="main"
      id="chat-container"></div>

    <div class="sidebar">
      <div class="room-controls">
        <input type="text"
          name="newRoom"
          placeholder="Name new room">
        <button id="room">Create</button>
      </div>
      <div class="allrooms"
        id="rooms-container">
        <span class="msg active">default</span>
      </div>
    </div>
  </div>

  <div class="text">
    <textarea name="message"
      rows="4"
      placeholder="Write a message..."></textarea>
    <button id="send">Send Msg</button>
  </div>

  <script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>
  <script type="text/javascript">
    const btnSend = document.querySelector('#send');
    const btnRoom = document.querySelector('#room');
    const txtMsg = document.querySelector('[name=message]');
    const divMain = document.querySelector('#chat-container');
    const inpRoom = document.querySelector('[name=newRoom]');
    const divRooms = document.querySelector('#rooms-container');

    // ESTADO DE LA APLICACIÓN
    let currentRoom = 'default';

    // Objeto que guardará el historial de mensajes por cada sala
    const chatHistory = {
      'default': []
    };

    const socket = io('/chat');

    socket.on('connect', () => {
      console.log('Connected:', socket.id);

      // Evento para el cuarto por defecto
      document.querySelector('div.allrooms span').addEventListener('click', onRoomClick);

      // Crear nueva sala
      btnRoom?.addEventListener('click', () => {
        const newRoom = inpRoom.value.trim();
        if (!newRoom) return;

        createRoomTab(newRoom);

        socket.emit('newroom', { newRoom, room: currentRoom });
        inpRoom.value = '';
      });

      // Recibir nueva sala de otro usuario
      socket.on('newroom', (newRoom) => {
        createRoomTab(newRoom);
      });

      // Enviar mensaje
      btnSend?.addEventListener('click', sendMessage);
      txtMsg?.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

      // Recibir mensaje
      socket.on('message', (data) => {
        // Si el servidor envía la sala a la que pertenece el mensaje, la usamos. 
        // Si no, asumimos que llegó a la sala en la que estamos actualmente.
        const targetRoom = data.room || currentRoom;
        saveAndRenderMessage(data.msg, targetRoom);
      });

      socket.on('history', (data) => {
        const { room, messages } = data;

        // Aseguramos que el cliente tenga la sala creada en su historial local
        if (!chatHistory[room]) {
          chatHistory[room] = [];
        }

        // Reemplazamos el historial local con el del servidor
        chatHistory[room] = messages.map(m => m.msg);

        // Si la sala que recibimos es la que estamos viendo actualmente, la repintamos
        if (room === currentRoom) {
          divMain.innerHTML = '';
          chatHistory[room].forEach(msg => renderSingleMessage(msg));
        }
      });
    });

    // --- FUNCIONES PRINCIPALES ---

    function sendMessage() {
      const message = txtMsg.value.trim();
      if (!message) return;

      // Guardamos el mensaje localmente y lo mostramos
      saveAndRenderMessage(message, currentRoom);

      // Lo enviamos al servidor
      socket.emit('message', {
        message: { msg: message },
        room: currentRoom
      });

      txtMsg.value = '';
    }

    // Guarda el mensaje en el historial y lo dibuja solo si estamos en esa sala
    function saveAndRenderMessage(msg, roomName) {
      // Si la sala no existe en el historial, la creamos
      if (!chatHistory[roomName]) {
        chatHistory[roomName] = [];
      }

      // Guardamos el mensaje
      chatHistory[roomName].push(msg);

      // Si la sala a la que llegó el mensaje es la que estamos viendo, lo dibujamos
      if (roomName === currentRoom) {
        renderSingleMessage(msg);
      }
    }

    // Dibuja un solo mensaje en el DOM
    function renderSingleMessage(msg) {
      const span = document.createElement('span');
      span.textContent = msg;
      span.classList.add('msg');
      divMain.appendChild(span);
      divMain.scrollTop = divMain.scrollHeight; // Auto-scroll
    }

    // Cambiar de pestaña (sala)
    function onRoomClick(event) {
      const element = event.target;
      if (!(element instanceof HTMLElement)) return;

      const selectedRoom = element.textContent;

      // Si hacemos clic en la sala en la que ya estamos, no hacemos nada
      if (currentRoom === selectedRoom) return;

      const before = currentRoom;
      currentRoom = selectedRoom;

      // 1. Actualizar las clases visuales de los tabs
      const active = document.querySelector('div.allrooms span.active');
      active?.classList.remove('active');
      element.classList.add('active');

      // 2. Limpiar el chat principal y cargar el historial de la nueva sala seleccionada
      divMain.innerHTML = '';
      const messagesToLoad = chatHistory[currentRoom] || [];
      messagesToLoad.forEach(msg => {
        renderSingleMessage(msg);
      });

      // 3. Informar al servidor del cambio
      socket.emit('changeRoom', {
        before,
        room: currentRoom
      });
    }

    // Crea visualmente la pestaña de una nueva sala
    function createRoomTab(roomName) {
      // Evita duplicados si la sala ya existe visualmente
      const exists = Array.from(divRooms.children).some(el => el.textContent === roomName);
      if (exists) return;

      // Inicia el historial vacío para esta sala si no existía
      if (!chatHistory[roomName]) {
        chatHistory[roomName] = [];
      }

      const span = document.createElement('span');
      span.textContent = roomName;
      span.classList.add('msg');
      span.addEventListener('click', onRoomClick);

      divRooms.appendChild(span);
    }
  </script>
</body>

</html>
